# Mudscryer apex landing page.
# - Only proxies "/" to Flask (which serves mudscryer.html when Host matches).
# - Everything else returns 404 — keeps the apex purely for the landing.
# - certbot --nginx will add the SSL block automatically when run.

server {
    listen 80;
    server_name mudscryer.org www.mudscryer.org;

    client_max_body_size 1m;

    # Only the landing path proxies to Flask.
    location = / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Don't expose any other Flask routes on the apex.
    location / {
        return 404;
    }
}
