<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d1a">
<title>VS Code · Exocortex</title>
<style>
:root {
    --bg: #0d0d1a;
    --card: rgba(26, 26, 46, 0.8);
    --accent: #7c5cbf;
    --accent-dim: #4a3a73;
    --text: #e0d0ff;
    --text-muted: rgba(180, 160, 220, 0.6);
    --border: #2a2a4a;
    --green: #4ec9b0;
    --red: #e74c3c;
    --yellow: #d4a80a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
.wrap {
    display: flex; align-items: center; justify-content: center;
    height: 100%; padding: 20px;
}
.box {
    width: 100%; max-width: 380px; text-align: center;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px 28px;
}
h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; letter-spacing: 0.5px; }
.sub { color: var(--text-muted); font-size: 13px; margin-bottom: 24px; }
.status-pill {
    display: inline-block; padding: 5px 14px; border-radius: 999px;
    font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
    margin-bottom: 18px;
}
.status-pill.on { background: rgba(78, 201, 176, 0.15); color: var(--green); }
.status-pill.off { background: rgba(180, 160, 220, 0.1); color: var(--text-muted); }
.status-pill.starting { background: rgba(212, 168, 10, 0.15); color: var(--yellow); }
.mem-row {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 6px; font-size: 13px;
}
.mem-label { color: var(--text-muted); }
.mem-value { font-variant-numeric: tabular-nums; font-weight: 600; }
.mem-bar {
    height: 6px; background: rgba(180, 160, 220, 0.12); border-radius: 3px;
    overflow: hidden; margin-bottom: 22px;
}
.mem-fill {
    height: 100%; transition: width 0.3s ease, background 0.3s ease;
    background: var(--green);
}
.mem-fill.low { background: var(--red); }
button {
    width: 100%; padding: 14px; border: none; border-radius: 10px;
    background: var(--accent); color: white;
    font-size: 15px; font-weight: 600;
    cursor: pointer; transition: opacity 0.15s, background 0.15s;
}
button:hover:not(:disabled) { opacity: 0.85; }
button:disabled { background: var(--accent-dim); cursor: not-allowed; opacity: 0.7; }
button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-muted); margin-top: 10px; }
button.secondary:hover:not(:disabled) { border-color: var(--text-muted); color: var(--text); }
.warn {
    background: rgba(231, 76, 60, 0.08); border: 1px solid rgba(231, 76, 60, 0.25);
    border-radius: 10px; padding: 14px; margin-bottom: 16px;
    font-size: 13px; text-align: left; color: var(--text);
}
.warn-title { font-weight: 700; color: var(--red); margin-bottom: 6px; font-size: 13px; }
.proc-list { font-size: 12px; color: var(--text-muted); }
.proc-list li {
    list-style: none; display: flex; justify-content: space-between;
    padding: 2px 0; font-variant-numeric: tabular-nums;
}
.spinner {
    display: inline-block; width: 12px; height: 12px;
    border: 2px solid rgba(180, 160, 220, 0.2); border-top-color: var(--yellow);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }
.muted-link {
    display: block; margin-top: 18px; font-size: 12px;
    color: var(--text-muted); text-decoration: none;
}
.muted-link:hover { color: var(--text); }
</style>
</head>
<body>
<div class="wrap">
    <div class="box">
        <h1>VS Code</h1>
        <p class="sub">In-browser editor — kept off to save memory</p>

        <div id="pill" class="status-pill off">checking…</div>

        <div class="mem-row">
            <span class="mem-label">Memory available</span>
            <span class="mem-value" id="mem-text">—</span>
        </div>
        <div class="mem-bar"><div class="mem-fill" id="mem-fill" style="width: 0%"></div></div>

        <div id="warn" class="warn" style="display:none">
            <div class="warn-title">Not enough memory to start</div>
            <div id="warn-detail">—</div>
            <ul class="proc-list" id="proc-list"></ul>
        </div>

        <button id="primary-btn">Open Editor</button>
        <button id="stop-btn" class="secondary" style="display:none">Close Editor (free memory)</button>
    </div>
</div>

<script>
const pill = document.getElementById("pill");
const memText = document.getElementById("mem-text");
const memFill = document.getElementById("mem-fill");
const warn = document.getElementById("warn");
const warnDetail = document.getElementById("warn-detail");
const procList = document.getElementById("proc-list");
const primaryBtn = document.getElementById("primary-btn");
const stopBtn = document.getElementById("stop-btn");

let pollHandle = null;
let starting = false;

function setPill(state, text) {
    pill.className = "status-pill " + state;
    pill.textContent = text;
}

function render(s) {
    const pct = Math.min(100, Math.round((s.available_mb / s.total_mb) * 100));
    memText.textContent = `${s.available_mb} MB / ${s.total_mb} MB`;
    memFill.style.width = pct + "%";
    memFill.classList.toggle("low", !s.ok_to_start && !s.running);

    if (s.running) {
        if (starting) {
            // Just transitioned to running → redirect.
            stopPolling();
            setPill("on", "running — opening…");
            setTimeout(() => { window.location.href = "/files/"; }, 400);
            return;
        }
        setPill("on", "running");
        warn.style.display = "none";
        primaryBtn.textContent = "Open Editor";
        primaryBtn.disabled = false;
        stopBtn.style.display = "block";
    } else {
        setPill("off", "off");
        stopBtn.style.display = "none";
        if (s.ok_to_start) {
            warn.style.display = "none";
            primaryBtn.textContent = "Open Editor";
            primaryBtn.disabled = false;
        } else {
            warn.style.display = "block";
            warnDetail.textContent = `Need ~${s.threshold_mb} MB free. Close some of these to make room:`;
            procList.innerHTML = s.top_processes
                .map(p => `<li><span>${p.name}</span><span>${p.mb} MB</span></li>`)
                .join("");
            primaryBtn.textContent = "Not enough memory";
            primaryBtn.disabled = true;
        }
    }
}

async function refresh() {
    try {
        const r = await fetch("/api/vscode/status");
        if (!r.ok) throw new Error(r.status);
        render(await r.json());
    } catch (e) {
        setPill("off", "status check failed");
    }
}

function startPolling() {
    if (pollHandle) return;
    pollHandle = setInterval(refresh, 1000);
}
function stopPolling() {
    if (pollHandle) { clearInterval(pollHandle); pollHandle = null; }
}

primaryBtn.addEventListener("click", async () => {
    primaryBtn.disabled = true;
    setPill("starting", "starting…");
    pill.innerHTML = '<span class="spinner"></span> starting…';
    starting = true;
    try {
        const r = await fetch("/api/vscode/start", { method: "POST" });
        if (!r.ok) {
            const data = await r.json().catch(() => ({}));
            throw new Error(data.error || "start failed");
        }
        startPolling();
    } catch (e) {
        starting = false;
        setPill("off", "start failed");
        primaryBtn.disabled = false;
        primaryBtn.textContent = "Try again";
    }
});

stopBtn.addEventListener("click", async () => {
    stopBtn.disabled = true;
    setPill("off", "stopping…");
    try {
        await fetch("/api/vscode/stop", { method: "POST" });
        await new Promise(r => setTimeout(r, 800));
    } finally {
        stopBtn.disabled = false;
        refresh();
    }
});

// Initial load: if it's already running, redirect immediately.
(async () => {
    try {
        const r = await fetch("/api/vscode/status");
        const s = await r.json();
        if (s.running) {
            window.location.href = "/files/";
            return;
        }
        render(s);
    } catch (e) {
        setPill("off", "status check failed");
    }
})();
</script>
</body>
</html>
