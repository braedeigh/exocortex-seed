<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Exocortex Chat</title>
<style>
:root {
    --bg: #1a1a2e;
    --chat-bg: #16213e;
    --user-bg: #0f3460;
    --assistant-bg: #1a1a2e;
    --text: #e0e0e0;
    --text-muted: #888;
    --accent: #e94560;
    --input-bg: #16213e;
    --border: #2a2a4a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; }
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
}

/* Header */
.header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header a { color: var(--text-muted); text-decoration: none; font-size: 14px; }

/* Messages area */
.messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    -webkit-overflow-scrolling: touch;
}
.message {
    margin-bottom: 16px;
    max-width: 90%;
    padding: 10px 14px;
    border-radius: 16px;
    line-height: 1.5;
    font-size: 15px;
    white-space: pre-wrap;
    word-wrap: break-word;
    -webkit-user-select: text;
    user-select: text;
}
.message.user {
    background: var(--user-bg);
    margin-left: auto;
    border-bottom-right-radius: 4px;
}
.message.assistant {
    background: var(--assistant-bg);
    border: 1px solid var(--border);
    margin-right: auto;
    border-bottom-left-radius: 4px;
}
.message.assistant .label,
.message.user .label {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 4px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.message.system {
    background: none;
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    max-width: 100%;
}

/* Tool use indicators */
.tool-use {
    font-size: 12px;
    color: var(--accent);
    padding: 4px 0;
    font-style: italic;
}

/* Markdown-ish formatting */
.message code {
    background: rgba(255,255,255,0.1);
    padding: 1px 5px;
    border-radius: 3px;
    font-family: "SF Mono", Monaco, "Cascadia Code", monospace;
    font-size: 13px;
}
.message pre {
    background: rgba(0,0,0,0.3);
    padding: 10px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 8px 0;
    font-size: 13px;
}
.message pre code {
    background: none;
    padding: 0;
}

/* Input area */
.input-area {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    flex-shrink: 0;
    background: var(--chat-bg);
}
.input-area textarea {
    flex: 1;
    background: var(--input-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 10px 16px;
    color: var(--text);
    font-size: 16px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 120px;
    line-height: 1.4;
}
.input-area textarea:focus {
    border-color: var(--accent);
}
.input-area button {
    background: var(--accent);
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    color: white;
    font-size: 20px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}
.input-area button:disabled {
    opacity: 0.4;
}

/* Thinking/loading indicator */
.typing {
    color: var(--text-muted);
    font-size: 13px;
    padding: 8px 16px;
    flex-shrink: 0;
}
.typing:empty { padding: 0; }
</style>
</head>
<body>

<div class="header">
    <h1>Exocortex</h1>
    <a href="/" target="_top">Dashboard</a>
</div>

<div class="messages" id="messages"></div>

<div class="typing" id="typing"></div>

<div class="input-area">
    <textarea id="input" rows="1" placeholder="Talk to me..." autocomplete="off" autocorrect="on" autocapitalize="sentences" spellcheck="true"></textarea>
    <button id="send" onclick="sendMessage()">&#8593;</button>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const typingEl = document.getElementById('typing');

let sessionId = null;
let sending = false;

// Auto-resize textarea
inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

// Enter to send (shift+enter for newline)
inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (role === 'user') {
        div.innerHTML = `<div class="label">You</div>${escapeHtml(text)}`;
    } else if (role === 'assistant') {
        div.innerHTML = `<div class="label">Claude</div>${formatText(text)}`;
    } else {
        div.textContent = text;
    }
    messagesEl.appendChild(div);
    scrollToBottom();
    return div;
}

function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
}

function formatText(text) {
    // Basic markdown: code blocks, inline code, bold, italic
    let html = escapeHtml(text);
    // Code blocks
    html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
    // Inline code
    html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
    // Bold
    html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
    return html;
}

async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || sending) return;

    sending = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    addMessage('user', text);

    // Create assistant message placeholder
    const assistantDiv = addMessage('assistant', '');
    let fullText = '';
    let toolUses = [];

    typingEl.textContent = 'Thinking...';

    try {
        const resp = await fetch('/api/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text, session_id: sessionId}),
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
            const {done, value} = await reader.read();
            if (done) break;

            buffer += decoder.decode(value, {stream: true});
            const lines = buffer.split('\n');
            buffer = lines.pop(); // keep incomplete line

            for (const line of lines) {
                if (!line.startsWith('data: ')) continue;
                const jsonStr = line.slice(6);
                try {
                    const event = JSON.parse(jsonStr);

                    if (event.type === 'system' && event.session_id) {
                        sessionId = event.session_id;
                    }

                    if (event.type === 'assistant' && event.message) {
                        for (const block of event.message.content) {
                            if (block.type === 'text') {
                                fullText += block.text;
                                assistantDiv.innerHTML = `<div class="label">Claude</div>${formatText(fullText)}`;
                                scrollToBottom();
                            }
                            if (block.type === 'tool_use') {
                                typingEl.textContent = `Using ${block.name}...`;
                            }
                        }
                    }

                    if (event.type === 'result') {
                        // Final result - use it if we didn't get streaming text
                        if (!fullText && event.result) {
                            fullText = event.result;
                            assistantDiv.innerHTML = `<div class="label">Claude</div>${formatText(fullText)}`;
                        }
                        typingEl.textContent = '';
                    }
                } catch(e) {
                    // skip unparseable lines
                }
            }
        }
    } catch (err) {
        assistantDiv.innerHTML = `<div class="label">Claude</div><span style="color:var(--accent)">Error: ${escapeHtml(err.message)}</span>`;
    }

    if (!fullText) {
        assistantDiv.innerHTML = `<div class="label">Claude</div><span style="color:var(--text-muted)">(no response)</span>`;
    }

    typingEl.textContent = '';
    sending = false;
    sendBtn.disabled = false;
    inputEl.focus();
}

// Focus input on load
inputEl.focus();
</script>
</body>
</html>
