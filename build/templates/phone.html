<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Exocortex</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

.container {
    display: flex;
    flex-direction: column;
    height: 100%;
    position: relative;
}

.terminal-frame {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    padding-right: env(safe-area-inset-right, 0px);
    padding-left: env(safe-area-inset-left, 0px);
    padding-bottom: 85px;
}
.terminal-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
    pointer-events: none;
    background: #000;
}


.scroll-buttons {
    position: fixed;
    top: 12px;
    right: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 5;
}
.scroll-buttons button {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    border: 1px solid rgba(124, 92, 191, 0.4);
    background: rgba(124, 92, 191, 0.04);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    color: rgba(124, 92, 191, 0.9);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-user-select: none;
    user-select: none;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2), inset 0 1px 0 rgba(255, 255, 255, 0.06);
}
.scroll-buttons button:active {
    background: rgba(124, 92, 191, 0.3);
    color: #e0d0ff;
}

.bottom-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: #0d0d1a;
    border-top: 1px solid #2a2a4a;
    padding-bottom: 0;
    z-index: 4;
}

.toolbar {
    display: flex;
    gap: 5px;
    padding: 5px 6px;
}
.toolbar button {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    color: #8888aa;
    padding: 8px 0;
    border-radius: 8px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    text-align: center;
}
.toolbar button:active {
    background: #2a2a4a;
    color: #c8c8e0;
}

.input-area {
    display: flex;
    gap: 6px;
    padding: 4px 6px 2px 6px;
    align-items: flex-end;
}
.input-area textarea {
    flex: 1;
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 18px;
    padding: 9px 14px;
    color: #e0e0e0;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    max-height: 100px;
    resize: none;
    line-height: 1.4;
}
.input-area textarea::placeholder { color: #555; }
.input-area textarea:focus { border-color: #7c5cbf; }
.input-area button {
    background: #7c5cbf;
    border: none;
    border-radius: 50%;
    width: 36px;
    height: 36px;
    color: white;
    font-size: 18px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
}
.input-area button:active { background: #9b7dd4; }

.copy-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.92);
    z-index: 10;
    padding: 12px;
    flex-direction: column;
}
.copy-overlay.active { display: flex; }
.copy-overlay textarea {
    flex: 1;
    background: #1a1a2e;
    color: #e0e0e0;
    border: 1px solid #2a2a4a;
    border-radius: 8px;
    padding: 12px;
    font-family: "SF Mono", Monaco, "Cascadia Code", Consolas, monospace;
    font-size: 13px;
    resize: none;
    -webkit-user-select: text;
    user-select: text;
    word-wrap: break-word;
    overflow-wrap: break-word;
    white-space: pre-wrap;
}
.copy-overlay .copy-actions { display: flex; gap: 8px; margin-top: 8px; }
.copy-overlay button {
    flex: 1;
    padding: 10px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
    cursor: pointer;
}
.copy-overlay .btn-copy { background: #7c5cbf; color: white; }
.copy-overlay .btn-close { background: #2a2a4a; color: #888; }
</style>
</head>
<body>

<div class="scroll-buttons">
    <button id="jumpTop" style="font-size:11px;">&#9650;&#9650;</button>
    <button id="scrollUp">&#9650;</button>
    <button id="scrollDown">&#9660;</button>
    <button id="jumpBottom" style="font-size:11px;">&#9660;&#9660;</button>
</div>

<div class="container">
    <div class="terminal-frame" style="position:relative;">
        <iframe id="term" tabindex="-1" inert></iframe>
        <script>
        // Load terminal with session from URL param (default: journal)
        const session = new URLSearchParams(window.location.search).get('session') || localStorage.getItem('exo-mobile-session') || 'journal';
        document.getElementById('term').src = '/terminal/?arg=' + session;
        </script>
        <div id="touchScroll" style="position:absolute;top:0;left:0;right:0;bottom:0;z-index:2;"></div>
    </div>

    <div class="bottom-bar">
        <div class="toolbar">
            <button onclick="sendSpecial('Enter')">ret</button>
            <button onclick="sendSpecial('Escape')">esc</button>
            <button onclick="sendSpecial('C-c')">^C</button>
            <button onclick="sendSpecial('C-o')">^O</button>
            <button onclick="sendSpecial('Up')">&#9650;</button>
            <button onclick="sendSpecial('Down')">&#9660;</button>
            <button onclick="openCopy()">copy</button>
            <button onclick="document.getElementById('photoInput').click()">photo</button>
            <button onclick="document.getElementById('term').src='/terminal/?arg=' + currentSession">&#8635;</button>
            <input type="file" id="photoInput" accept="image/*" style="display:none" tabindex="-1" onchange="uploadPhoto(this)">
        </div>
        <div class="input-area">
            <textarea id="input" rows="1" placeholder="message..." autocomplete="off" autocorrect="on" autocapitalize="sentences" spellcheck="true"></textarea>
            <button onclick="sendInput()">&#8593;</button>
        </div>
    </div>
</div>

<div class="copy-overlay" id="copyOverlay">
    <textarea id="copyText" readonly tabindex="-1"></textarea>
    <div class="copy-actions">
        <button class="btn-copy" onclick="doCopy()">copy</button>
        <button class="btn-close" onclick="closeCopy()">close</button>
    </div>
</div>

<script>
const inputEl = document.getElementById('input');
const copyOverlay = document.getElementById('copyOverlay');
const copyText = document.getElementById('copyText');
const currentSession = new URLSearchParams(window.location.search).get('session') || 'journal';

// Auto-grow textarea — bottom bar is absolutely positioned so growing
// the textarea expands upward over the terminal without resizing the iframe
inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});

// Enter key inserts newline (default textarea behavior), send button sends

async function sendInput() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    const resp = await fetch('/api/terminal/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text: text, enter: true, session: currentSession}),
    });
    const data = await resp.json();
    if (data.saved_to) {
        inputEl.placeholder = 'Saved to file — path pasted into terminal';
        setTimeout(() => { inputEl.placeholder = 'message...'; }, 3000);
    }
}

async function sendSpecial(key) {
    await fetch('/api/terminal/send', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({key: key, session: currentSession}),
    });
}

async function openCopy() {
    const resp = await fetch('/api/terminal/capture?session=' + currentSession);
    const data = await resp.json();
    copyText.value = data.text;
    copyOverlay.classList.add('active');
    copyText.focus();
    copyText.select();
}

function doCopy() {
    copyText.select();
    navigator.clipboard.writeText(copyText.value).then(() => closeCopy()).catch(() => { document.execCommand('copy'); closeCopy(); });
}

function closeCopy() { copyOverlay.classList.remove('active'); }

async function uploadPhoto(input) {
    if (!input.files.length) return;
    const formData = new FormData();
    formData.append('photo', input.files[0]);
    const resp = await fetch('/api/terminal/upload', { method: 'POST', body: formData });
    const data = await resp.json();
    if (data.path) {
        await fetch('/api/terminal/send', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: '[uploaded: ' + data.path + ']', enter: false, session: currentSession}),
        });
    }
    input.value = '';
}

// Touch-to-scroll on terminal area
const touchLayer = document.getElementById('touchScroll');
let touchStartY = null;
touchLayer.addEventListener('touchstart', (e) => {
    touchStartY = e.touches[0].clientY;
}, {passive: true});
touchLayer.addEventListener('touchmove', (e) => {
    e.preventDefault();
}, {passive: false});
touchLayer.addEventListener('touchend', (e) => {
    if (touchStartY === null) return;
    const deltaY = e.changedTouches[0].clientY - touchStartY;
    touchStartY = null;
    if (Math.abs(deltaY) < 50) return;
    const dir = deltaY > 0 ? 'up' : 'down';
    const lines = Math.min(Math.max(Math.floor(Math.abs(deltaY) / 15), 1), 30);
    fetch('/api/terminal/scroll', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({direction: dir, mode: 'lines', lines: lines, session: currentSession}),
    });
}, {passive: true});

// Scroll helpers
function scrollCmd(direction, mode) {
    fetch('/api/terminal/scroll', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({direction: direction, mode: mode, session: currentSession}),
    });
}

// Hold-to-scroll for page up/down
function setupHoldButton(el, direction) {
    let interval = null;
    const start = () => {
        scrollCmd(direction, 'page');
        interval = setInterval(() => scrollCmd(direction, 'page'), 250);
    };
    const stop = () => {
        if (interval) { clearInterval(interval); interval = null; }
    };
    el.addEventListener('touchstart', (e) => { e.preventDefault(); start(); });
    el.addEventListener('touchend', stop);
    el.addEventListener('touchcancel', stop);
    el.addEventListener('mousedown', start);
    el.addEventListener('mouseup', stop);
    el.addEventListener('mouseleave', stop);
}
setupHoldButton(document.getElementById('scrollUp'), 'up');
setupHoldButton(document.getElementById('scrollDown'), 'down');

// Jump to top/bottom — single tap
document.getElementById('jumpTop').addEventListener('click', () => scrollCmd('up', 'end'));
document.getElementById('jumpBottom').addEventListener('click', () => scrollCmd('down', 'end'));

// Track whether this tab is active — set by parent via postMessage
let _tabActive = (window === window.top); // true if loaded directly, false if in iframe

window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'tabActive') {
        _tabActive = e.data.active;
        if (_tabActive) inputEl.focus();
    }
});

// Auto-refresh tmux after terminal iframe loads
document.getElementById('term').addEventListener('load', () => {
    setTimeout(() => fetch('/api/terminal/refresh', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({session: currentSession}),
    }), 500);
    if (_tabActive) setTimeout(() => inputEl.focus(), 600);
});

// Guard against iframe stealing focus — only when this tab is active
document.addEventListener('focusout', (e) => {
    setTimeout(() => {
        if (!_tabActive) return;
        if (document.activeElement === document.body ||
            document.activeElement === document.getElementById('term')) {
            inputEl.focus();
        }
    }, 10);
});

if (_tabActive) inputEl.focus();
</script>
</body>
</html>
